<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>Postbuman · HuTu</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/tool.css">
  <link rel="stylesheet" href="/static/css/request-local.css">
  <link rel="stylesheet" href="/static/css/markdown-reviewer.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="/">HuTu</a>
      <nav class="site-nav">
        <a class="nav-item" href="/">← 返回首页</a>
      </nav>
    </div>
  </header>

  <main class="container container-wide">
    <div class="tool-header">
      <h1>Postbuman</h1>
      <p class="subtitle">在地址栏粘贴 curl，解析后直接发送请求查看响应（不做本地端口映射）；支持分享链接</p>
    </div>

    <div class="md-share-bar" id="pb-share-bar" hidden>
      <span class="md-share-label">分享链接</span>
      <input type="text" class="md-share-url" id="pb-share-url" readonly spellcheck="false">
      <button type="button" class="btn-link" id="copy-share-url">复制链接</button>
      <span class="md-share-status" id="pb-share-status" hidden>已自动保存</span>
    </div>

    <!-- <p class="md-share-hint" id="pb-share-hint">配置好请求后点击「分享」生成链接；分享后修改会自动保存。</p> -->

    <div id="error" class="error" hidden></div>

    <section class="request-preview-section" id="request-preview-section">
      <div class="preview-section-header">
        <h2>请求预览</h2>
        <div class="preview-section-actions">
          <button type="button" class="btn-link" id="share-request">分享</button>
          <button type="button" class="btn-link" id="clear-preview">清空</button>
        </div>
      </div>

      <div class="preview-request-bar">
        <select id="preview-method" class="preview-method-select" title="请求方法"></select>
        <input type="text" id="preview-url" class="preview-url-input" spellcheck="false"
               placeholder="粘贴 curl 或输入 URL...">
               <button type="button" class="btn-primary btn-accent" id="paste-send-btn">粘贴并发送</button>
        <button type="button" class="btn-primary preview-send-btn" id="send-btn">发送</button>
      </div>

      <div class="preview-tabs">
        <button type="button" class="preview-tab active" data-preview-tab="params" id="preview-tab-params">Params</button>
        <button type="button" class="preview-tab" data-preview-tab="headers" id="preview-tab-headers">Headers</button>
        <button type="button" class="preview-tab" data-preview-tab="body">Body</button>
      </div>

      <div class="preview-panel" data-preview-panel="params">
        <p class="preview-panel-label">Query Params</p>
        <div class="preview-table-wrap">
          <table class="preview-table">
            <thead>
              <tr>
                <th width="36"></th>
                <th>Key</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="preview-params-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="preview-panel" data-preview-panel="headers" hidden>
        <p class="preview-panel-label">Headers</p>
        <div class="preview-table-wrap">
          <table class="preview-table">
            <thead>
              <tr>
                <th width="36"></th>
                <th>Key</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="preview-headers-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="preview-panel" data-preview-panel="body" hidden>
        <div class="body-type-bar" id="body-type-bar">
          <label class="body-type-option"><input type="radio" name="body-type" value="none" checked> none</label>
          <label class="body-type-option"><input type="radio" name="body-type" value="form-data"> form-data</label>
          <label class="body-type-option"><input type="radio" name="body-type" value="urlencoded"> x-www-form-urlencoded</label>
          <label class="body-type-option"><input type="radio" name="body-type" value="raw"> raw</label>
          <label class="body-type-option"><input type="radio" name="body-type" value="binary"> binary</label>
          <label class="body-type-option"><input type="radio" name="body-type" value="graphql"> GraphQL</label>
        </div>
        <div class="body-sub-panel" id="body-panel-none">
          <p class="body-none-hint">此请求没有 Body</p>
        </div>
        <div class="body-sub-panel" id="body-panel-form-data" hidden>
          <div class="preview-table-wrap">
            <table class="preview-table">
              <thead><tr><th width="36"></th><th>Key</th><th>Value</th></tr></thead>
              <tbody id="preview-formdata-tbody"></tbody>
            </table>
          </div>
        </div>
        <div class="body-sub-panel" id="body-panel-urlencoded" hidden>
          <div class="preview-table-wrap">
            <table class="preview-table">
              <thead><tr><th width="36"></th><th>Key</th><th>Value</th></tr></thead>
              <tbody id="preview-urlencoded-tbody"></tbody>
            </table>
          </div>
        </div>
        <div class="body-sub-panel" id="body-panel-raw" hidden>
          <div class="raw-type-bar">
            <label for="preview-raw-type">类型</label>
            <select id="preview-raw-type">
              <option value="json">JSON</option>
              <option value="text">Text</option>
              <option value="javascript">JavaScript</option>
              <option value="html">HTML</option>
              <option value="xml">XML</option>
            </select>
          </div>
          <textarea id="preview-body-input" class="preview-body-input" spellcheck="false"
                    placeholder="Raw body 内容"></textarea>
        </div>
        <div class="body-sub-panel" id="body-panel-binary" hidden>
          <div class="binary-upload">
            <input type="file" id="preview-binary-file">
            <span class="binary-name" id="preview-binary-name">未选择文件</span>
          </div>
        </div>
        <div class="body-sub-panel" id="body-panel-graphql" hidden>
          <label class="graphql-label">Query</label>
          <textarea id="preview-graphql-query" class="preview-body-input graphql-query" spellcheck="false"
                    placeholder="GraphQL query"></textarea>
          <label class="graphql-label">Variables (JSON)</label>
          <textarea id="preview-graphql-vars" class="preview-body-input graphql-vars" spellcheck="false"
                    placeholder="{}"></textarea>
        </div>
      </div>
    </section>

    <section class="response-section">
      <div class="response-header">
        <h2>响应</h2>
        <span class="status-badge" id="status-badge" hidden></span>
        <span class="response-meta" id="response-meta"></span>
      </div>
      <div class="response-viewer-wrap" id="response-viewer">
        <div class="response-viewer">
          <div class="response-viewer-empty">响应内容将显示在这里</div>
          <div class="response-viewer-scroll" hidden>
            <div class="response-viewer-lines"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="history-section">
      <div class="history-header">
        <p class="panel-desc">发送历史</p>
        <button type="button" class="btn-secondary" id="clear-history">清空历史</button>
      </div>
      <div class="history-wrap">
        <table class="history-table" id="history-table">
          <thead>
            <tr>
              <th width="150">时间</th>
              <th width="60">方法</th>
              <th>URL</th>
              <th width="70">状态</th>
              <th width="70">耗时</th>
              <th width="120">操作</th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
        <div class="history-empty" id="history-empty" hidden>暂无记录</div>
      </div>
      <div class="history-pagination" id="history-pagination" hidden>
        <span class="history-page-info" id="history-page-info"></span>
        <div class="history-page-btns">
          <button type="button" class="btn-page" id="history-prev">上一页</button>
          <button type="button" class="btn-page" id="history-next">下一页</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>请求通过 HuTu 服务转发至目标地址</p>
  </footer>

  <script src="/static/js/curl-convert.js"></script>
  <script src="/static/js/request-preview.js"></script>
  <script src="/static/js/response-viewer.js"></script>
  <script src="/static/js/request-send-ui.js"></script>
  <script src="/static/js/request-share.js" data-api="/api/postbuman/share"></script>
  <script src="/static/js/postbuman.js"></script>
</body>
</html>
