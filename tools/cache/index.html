<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>清查缓存 · HuTu</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/tool.css">
  <link rel="stylesheet" href="/static/css/response-viewer.css">
  <link rel="stylesheet" href="/static/css/cache.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="/">HuTu</a>
      <nav class="site-nav">
        <a class="nav-item" href="/">← 返回首页</a>
      </nav>
    </div>
  </header>

  <main class="container container-wide">
    <div class="tool-header">
      <h1>清查缓存</h1>
      <p class="subtitle">查询与清理 icgoo 缓存，输入 key 后点击查询或删除</p>
    </div>

    <div id="error" class="error" hidden></div>

    <section class="quick-api-block">
      <div class="quick-api-card">
        <input
          type="text"
          class="quick-api-input"
          id="cache-key"
          spellcheck="false"
          placeholder="specific_cache_key"
          autocomplete="off"
        >
        <div class="quick-api-actions">
          <button type="button" class="quick-api-action" id="check-cache-btn">查询</button>
          <button type="button" class="quick-api-action quick-api-action-danger" id="clear-cache-btn">删除</button>
        </div>
      </div>
    </section>

    <section class="quick-api-response card">
      <div class="quick-api-response-header">
        <h2 class="quick-api-section-title">响应</h2>
        <div class="quick-api-response-meta">
          <span class="status-badge" id="status-badge" hidden></span>
          <span class="quick-api-elapsed" id="response-meta"></span>
        </div>
      </div>
      <div class="response-viewer-wrap" id="response-viewer"></div>
    </section>
  </main>

  <footer class="site-footer">
    <!-- <p>请求通过 HuTu 服务转发至 v8api.k0v.cn</p> -->
  </footer>

  <script src="/static/js/response-viewer.js"></script>
  <script src="/static/js/request-client.js"></script>
  <script src="/static/js/cache.js"></script>
</body>
</html>
