<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>Dict to JSON · HuTu</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/tool.css">
  <link rel="stylesheet" href="/static/css/response-viewer.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="/">HuTu</a>
      <nav class="site-nav">
        <a class="nav-item" href="/">← 返回首页</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Python Dict ↔ JSON</h1>
      <p class="subtitle">粘贴或编辑任一侧，自动双向同步转换</p>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-header">
          <span>Python Dict</span>
          <div class="panel-header-actions">
            <button type="button" class="btn-link" id="clear-input">清空</button>
            <button type="button" class="btn-link" id="copy-input">复制</button>
          </div>
        </div>
        <textarea id="input" spellcheck="false" placeholder="例如：&#10;{&#10;  'name': 'ICGOO',&#10;  'active': True,&#10;  'count': None,&#10;  'items': [1, 2, 3]&#10;}"></textarea>
      </div>

      <div class="panel panel-json">
        <div class="panel-header">
          <span>JSON</span>
          <div class="panel-header-actions">
            <button type="button" class="btn-link" id="expand-json">放大</button>
            <button type="button" class="btn-link" id="clear-json">清空</button>
            <button type="button" class="btn-link" id="copy-output">复制</button>
          </div>
        </div>
        <div class="panel-viewer-wrap response-viewer-wrap panel-json-editor" id="json-wrap">
          <textarea id="json-text" spellcheck="false"
                    placeholder="JSON 将自动同步显示在这里，可直接编辑"></textarea>
        </div>
      </div>
    </div>

    <div id="json-viewer-helper" class="rv-viewer-helper" aria-hidden="true">
      <div class="response-viewer-wrap">
        <div class="response-viewer">
          <div class="response-viewer-empty"></div>
          <div class="response-viewer-scroll" hidden>
            <div class="response-viewer-lines"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="error" hidden></div>
  </main>

  <footer class="site-footer">
    <p>本地运行 · 无需访问国外网站</p>
  </footer>

  <button type="button" class="back-to-top" id="back-to-top" title="回到顶部" aria-label="回到顶部" hidden>↑</button>

  <script src="/static/js/line-editor.js"></script>
  <script src="/static/js/response-viewer.js"></script>
  <script src="/static/js/json-panel.js"></script>
  <script src="/static/js/dict-to-json.js"></script>
</body>
</html>
