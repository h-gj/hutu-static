<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>在线记事本 · HuTu</title>
  <link rel="stylesheet" href="/static/css/note-editor.css">
</head>
<body class="note-editor-body">
  <header class="note-editor-bar">
    <a class="note-editor-logo" href="/">HuTu</a>
    <span class="note-editor-path">在线记事本</span>
    <div class="note-editor-actions">
      <button type="button" class="note-btn" id="clear-note">清空</button>
      <button type="button" class="note-btn" id="copy-link">复制链接</button>
      <span class="note-save-status" id="save-status"></span>
    </div>
  </header>

  <textarea id="note-content" class="note-editor-textarea" spellcheck="false"
            placeholder="开始输入…"></textarea>

  <script src="/static/js/static-storage.js"></script>
  <script src="/static/js/note-editor.js?v=5"></script>
</body>
</html>
